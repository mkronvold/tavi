name: Refresh container images

on:
  schedule:
    - cron: "17 8 * * 1"
  workflow_dispatch:

concurrency:
  group: refresh-images-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  prepare:
    name: Prepare refresh tag
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    outputs:
      refresh_tag: ${{ steps.tag.outputs.refresh_tag }}
    steps:
      - name: Create refresh tag
        id: tag
        run: echo "refresh_tag=refresh-$(date -u +'%Y%m%d-%H%M%S')" >> "$GITHUB_OUTPUT"

  validate:
    name: Validate workspace
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Prepare generated artifacts
        run: |
          corepack pnpm --filter @tavi/config build
          corepack pnpm --filter @tavi/schemas build
          corepack pnpm --filter @tavi/api prisma:generate

      - name: Lint
        run: corepack pnpm lint

      - name: Typecheck
        run: corepack pnpm typecheck

  refresh:
    name: Refresh ${{ matrix.service }} image
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    needs:
      - prepare
      - validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            image: tavi-api
            dockerfile: infra/docker/api.Dockerfile
          - service: web
            image: tavi-web
            dockerfile: infra/docker/web.Dockerfile
          - service: worker
            image: tavi-worker
            dockerfile: infra/docker/worker.Dockerfile

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Normalize GHCR owner
        id: vars
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.vars.outputs.owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.prepare.outputs.refresh_tag }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.title=${{ matrix.image }}

      - name: Build and publish refreshed image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          pull: true
          no-cache: true
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
