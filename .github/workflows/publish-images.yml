name: Publish container images

on:
  pull_request:
    paths:
      - ".dockerignore"
      - ".github/dependabot.yml"
      - ".github/workflows/automerge-dependencies.yml"
      - ".github/workflows/publish-images.yml"
      - ".github/workflows/refresh-images.yml"
      - "apps/**"
      - "packages/**"
      - "infra/docker/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "tsconfig.base.json"
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".dockerignore"
      - ".github/dependabot.yml"
      - ".github/workflows/automerge-dependencies.yml"
      - ".github/workflows/publish-images.yml"
      - ".github/workflows/refresh-images.yml"
      - "apps/**"
      - "packages/**"
      - "infra/docker/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "tsconfig.base.json"
  workflow_dispatch:

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate workspace
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Prepare generated artifacts
        run: |
          corepack pnpm --filter @tavi/config build
          corepack pnpm --filter @tavi/schemas build
          corepack pnpm --filter @tavi/api prisma:generate

      - name: Lint
        run: corepack pnpm lint

      - name: Typecheck
        run: corepack pnpm typecheck

  build-and-publish:
    name: Build ${{ matrix.service }} image
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            image: tavi-api
            dockerfile: infra/docker/api.Dockerfile
          - service: web
            image: tavi-web
            dockerfile: infra/docker/web.Dockerfile
          - service: worker
            image: tavi-worker
            dockerfile: infra/docker/worker.Dockerfile

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Normalize GHCR owner
        id: vars
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.vars.outputs.owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.title=${{ matrix.image }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          pull: true
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
