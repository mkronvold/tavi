name: Auto-merge dependency updates

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    name: Auto-merge safe Dependabot updates
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check auto-merge policy
        id: policy
        env:
          PACKAGE_ECOSYSTEM: ${{ steps.metadata.outputs.package-ecosystem }}
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
        run: |
          set -euo pipefail

          case "$PACKAGE_ECOSYSTEM" in
            npm_and_yarn|github_actions|docker) ;;
            *)
              echo "Skipping unsupported Dependabot ecosystem: $PACKAGE_ECOSYSTEM"
              exit 0
              ;;
          esac

          case "$UPDATE_TYPE" in
            version-update:semver-patch|version-update:semver-minor)
              echo "automerge=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Leaving update for manual review: $UPDATE_TYPE"
              ;;
          esac

      - name: Approve dependency update
        if: steps.policy.outputs.automerge == 'true' && github.event.pull_request.draft == false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr review --approve "$PR_URL"

      - name: Enable auto-merge
        if: steps.policy.outputs.automerge == 'true' && github.event.pull_request.draft == false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          set -euo pipefail

          if gh pr view "$PR_URL" --json autoMergeRequest --jq '.autoMergeRequest != null' | grep -qx true; then
            echo "Auto-merge is already enabled for $PR_URL"
            exit 0
          fi

          gh pr merge --auto --squash --delete-branch "$PR_URL"
