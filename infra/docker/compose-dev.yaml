services:
  postgres:
    container_name: tavi-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tavi
      POSTGRES_PASSWORD: tavi
      POSTGRES_USER: tavi
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tavi -d tavi"]
      interval: 2s
      timeout: 3s
      retries: 30

  api:
    container_name: tavi-api
    image: node:24-bookworm
    working_dir: /workspace
    command: >
      bash -lc "
      mkdir -p /workspace/node_modules &&
      chown -R $$LOCAL_UID:$$LOCAL_GID /workspace/node_modules &&
      env CI=true HOME=/tmp COREPACK_HOME=/tmp/corepack setpriv --reuid=$$LOCAL_UID --regid=$$LOCAL_GID --clear-groups corepack pnpm install --store-dir /workspace/node_modules/.pnpm-store --frozen-lockfile &&
      env HOME=/tmp COREPACK_HOME=/tmp/corepack setpriv --reuid=$$LOCAL_UID --regid=$$LOCAL_GID --clear-groups corepack pnpm --filter @tavi/config build &&
      env HOME=/tmp COREPACK_HOME=/tmp/corepack setpriv --reuid=$$LOCAL_UID --regid=$$LOCAL_GID --clear-groups corepack pnpm --filter @tavi/schemas build &&
      env HOME=/tmp COREPACK_HOME=/tmp/corepack setpriv --reuid=$$LOCAL_UID --regid=$$LOCAL_GID --clear-groups corepack pnpm --filter @tavi/api prisma:generate &&
      env HOME=/tmp COREPACK_HOME=/tmp/corepack setpriv --reuid=$$LOCAL_UID --regid=$$LOCAL_GID --clear-groups corepack pnpm --filter @tavi/api prisma:migrate &&
      env HOME=/tmp COREPACK_HOME=/tmp/corepack setpriv --reuid=$$LOCAL_UID --regid=$$LOCAL_GID --clear-groups corepack pnpm --filter @tavi/api prisma:seed &&
      env HOME=/tmp COREPACK_HOME=/tmp/corepack setpriv --reuid=$$LOCAL_UID --regid=$$LOCAL_GID --clear-groups corepack pnpm --filter @tavi/api dev
      "
    environment:
      BACKUP_DIRECTORY: "${BACKUP_DIRECTORY:-/var/tavi/backups}"
      DATABASE_URL: postgresql://tavi:tavi@postgres:5432/tavi?schema=public
      COOKIE_SECRET: tavi-local-dev-secret
      CORS_ORIGIN: http://localhost:5173
      LOCAL_GID: "${GID:-1000}"
      LOCAL_UID: "${UID:-1000}"
      PORT: 4000
      SMTP_URL: "${SMTP_URL:-smtp://10.120.64.99:25}"
      SMTP_FROM: "${SMTP_FROM:-noreply@tavi.local}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASS: "${SMTP_PASS:-}"
      TAVI_HOME_URL: "${TAVI_HOME_URL:-http://localhost:5173}"
    ports:
      - "4000:4000"
    volumes:
      - ../../:/workspace
      - ${BACKUP_HOST_DIRECTORY:-../../backups}:${BACKUP_DIRECTORY:-/var/tavi/backups}
      - workspace-node_modules:/workspace/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/api/health').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  web:
    container_name: tavi-web
    image: node:24-bookworm
    working_dir: /workspace
    command: >
      bash -lc "
      rm -rf /workspace/apps/web/node_modules/.vite &&
      mkdir -p /workspace/apps/web/node_modules &&
      chown -R $$LOCAL_UID:$$LOCAL_GID /workspace/apps/web/node_modules &&
      mkdir -p /workspace/node_modules &&
      chown -R $$LOCAL_UID:$$LOCAL_GID /workspace/node_modules &&
      env HOME=/tmp COREPACK_HOME=/tmp/corepack setpriv --reuid=$$LOCAL_UID --regid=$$LOCAL_GID --clear-groups corepack pnpm --filter @tavi/web dev --host 0.0.0.0 --port 5173
      "
    environment:
      LOCAL_GID: "${GID:-1000}"
      LOCAL_UID: "${UID:-1000}"
      VITE_API_PROXY_TARGET: http://api:4000
      VITE_APP_HOME_URL: "${TAVI_HOME_URL:-http://localhost:5173}"
    ports:
      - "5173:5173"
    volumes:
      - ../../:/workspace
      - workspace-node_modules:/workspace/node_modules
    depends_on:
      api:
        condition: service_healthy

  worker:
    container_name: tavi-worker
    image: node:24-bookworm
    working_dir: /workspace
    command: >
      bash -lc "
      mkdir -p /workspace/node_modules &&
      chown -R $$LOCAL_UID:$$LOCAL_GID /workspace/node_modules &&
      env HOME=/tmp COREPACK_HOME=/tmp/corepack setpriv --reuid=$$LOCAL_UID --regid=$$LOCAL_GID --clear-groups corepack pnpm --filter @tavi/api prisma:generate &&
      env HOME=/tmp COREPACK_HOME=/tmp/corepack setpriv --reuid=$$LOCAL_UID --regid=$$LOCAL_GID --clear-groups corepack pnpm --filter @tavi/worker dev
      "
    environment:
      BACKUP_DIRECTORY: "${BACKUP_DIRECTORY:-/var/tavi/backups}"
      DATABASE_URL: postgresql://tavi:tavi@postgres:5432/tavi?schema=public
      LOCAL_GID: "${GID:-1000}"
      LOCAL_UID: "${UID:-1000}"
      PORT: 4100
      SMTP_URL: "${SMTP_URL:-smtp://10.120.64.99:25}"
      SMTP_FROM: "${SMTP_FROM:-noreply@tavi.local}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASS: "${SMTP_PASS:-}"
      TAVI_HOME_URL: "${TAVI_HOME_URL:-http://localhost:5173}"
    ports:
      - "4100:4100"
    volumes:
      - ../../:/workspace
      - ${BACKUP_HOST_DIRECTORY:-../../backups}:${BACKUP_DIRECTORY:-/var/tavi/backups}
      - workspace-node_modules:/workspace/node_modules
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4100/health').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

volumes:
  postgres-data:
  workspace-node_modules:
