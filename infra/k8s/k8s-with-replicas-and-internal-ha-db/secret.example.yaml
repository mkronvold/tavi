apiVersion: v1
kind: Secret
metadata:
  name: tavi-secrets
  namespace: tavi
type: Opaque
stringData:
  DATABASE_URL: "postgresql://tavi:replace-me@tavi-postgres-rw:5432/tavi?schema=public"
  COOKIE_SECRET: "replace-me"
  SMTP_USER: ""
  SMTP_PASS: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: tavi-postgres-app
  namespace: tavi
type: kubernetes.io/basic-auth
stringData:
  username: "tavi"
  password: "replace-me"
---
apiVersion: v1
kind: Secret
metadata:
  name: tavi-postgres-superuser
  namespace: tavi
type: kubernetes.io/basic-auth
stringData:
  username: "postgres"
  password: "replace-me"
