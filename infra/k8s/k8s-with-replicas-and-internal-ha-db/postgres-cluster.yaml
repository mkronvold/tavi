apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: tavi-postgres
  namespace: tavi
spec:
  instances: 3
  primaryUpdateStrategy: unsupervised
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  securityContext:
    seccompProfile:
      type: RuntimeDefault
    privileged: false
    runAsNonRoot: true
    capabilities:
      drop:
        - ALL
    allowPrivilegeEscalation: false
  storage:
    size: 10Gi
  bootstrap:
    initdb:
      database: tavi
      owner: tavi
      secret:
        name: tavi-postgres-app
  superuserSecret:
    name: tavi-postgres-superuser
