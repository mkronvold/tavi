apiVersion: apps/v1
kind: Deployment
metadata:
  name: tavi-api
  namespace: tavi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tavi-api
  template:
    metadata:
      annotations:
        prometheus.io/path: /api/metrics
        prometheus.io/port: "4000"
        prometheus.io/scrape: "true"
      labels:
        app: tavi-api
    spec:
      initContainers:
        - name: migrate
          image: ghcr.io/mkronvold/tavi-api:latest
          imagePullPolicy: IfNotPresent
          command: ["pnpm", "--filter", "@tavi/api", "prisma:migrate"]
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: tavi-config
                  key: API_PORT
            - name: CORS_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: tavi-config
                  key: CORS_ORIGIN
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tavi-secrets
                  key: DATABASE_URL
            - name: COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: tavi-secrets
                  key: COOKIE_SECRET
      containers:
        - name: api
          image: ghcr.io/mkronvold/tavi-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: tavi-config
                  key: API_PORT
            - name: CORS_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: tavi-config
                  key: CORS_ORIGIN
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tavi-secrets
                  key: DATABASE_URL
            - name: COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: tavi-secrets
                  key: COOKIE_SECRET
            - name: SMTP_URL
              valueFrom:
                configMapKeyRef:
                  name: tavi-config
                  key: SMTP_URL
            - name: SMTP_FROM
              valueFrom:
                configMapKeyRef:
                  name: tavi-config
                  key: SMTP_FROM
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: tavi-secrets
                  key: SMTP_USER
                  optional: true
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: tavi-secrets
                  key: SMTP_PASS
                  optional: true
            - name: TAVI_HOME_URL
              valueFrom:
                configMapKeyRef:
                  name: tavi-config
                  key: TAVI_HOME_URL
          readinessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 20
            periodSeconds: 20
