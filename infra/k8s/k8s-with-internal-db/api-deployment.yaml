apiVersion: apps/v1
kind: Deployment
metadata:
  name: tavi-api
  namespace: tavi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tavi-api
  template:
    metadata:
      annotations:
        prometheus.io/path: /api/metrics
        prometheus.io/port: "4000"
        prometheus.io/scrape: "true"
      labels:
        app: tavi-api
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: migrate
          image: ghcr.io/mkronvold/tavi-api:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            seccompProfile:
              type: RuntimeDefault
            privileged: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL
            allowPrivilegeEscalation: false
          resources:
            requests:
              cpu: 100m
              ephemeral-storage: 64Mi
              memory: 128Mi
            limits:
              cpu: 500m
              ephemeral-storage: 256Mi
              memory: 256Mi
          command: ["pnpm", "--filter", "@tavi/api", "prisma:migrate"]
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: tavi-config
                  key: API_PORT
            - name: CORS_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: tavi-config
                  key: CORS_ORIGIN
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tavi-secrets
                  key: DATABASE_URL
            - name: COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: tavi-secrets
                  key: COOKIE_SECRET
      containers:
        - name: api
          image: ghcr.io/mkronvold/tavi-api:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            seccompProfile:
              type: RuntimeDefault
            privileged: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL
            allowPrivilegeEscalation: false
          resources:
            requests:
              cpu: 200m
              ephemeral-storage: 64Mi
              memory: 256Mi
            limits:
              cpu: 1000m
              ephemeral-storage: 256Mi
              memory: 512Mi
          ports:
            - containerPort: 4000
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: tavi-config
                  key: API_PORT
            - name: CORS_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: tavi-config
                  key: CORS_ORIGIN
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tavi-secrets
                  key: DATABASE_URL
            - name: COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: tavi-secrets
                  key: COOKIE_SECRET
            - name: SMTP_URL
              valueFrom:
                secretKeyRef:
                  name: tavi-secrets
                  key: SMTP_URL
                  optional: true
            - name: SMTP_FROM
              valueFrom:
                configMapKeyRef:
                  name: tavi-config
                  key: SMTP_FROM
            - name: TAVI_HOME_URL
              valueFrom:
                configMapKeyRef:
                  name: tavi-config
                  key: TAVI_HOME_URL
            - name: BACKUP_DIRECTORY
              valueFrom:
                configMapKeyRef:
                  name: tavi-config
                  key: BACKUP_DIRECTORY
          volumeMounts:
            - name: tavi-backups
              mountPath: /var/tavi/backups
          readinessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 20
            periodSeconds: 20
      volumes:
        - name: tavi-backups
          persistentVolumeClaim:
            claimName: tavi-backups
