apiVersion: batch/v1
kind: CronJob
metadata:
  name: tavi-backup-post-process
  namespace: tavi
spec:
  schedule: "30 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: archive-backups
              image: alpine:3.22
              command: ["/bin/sh", "-lc"]
              args:
                - |
                  set -eu
                  archive_dir="/archive/$(date -u +%Y%m%dT%H%M%SZ)"
                  mkdir -p "${archive_dir}"
                  cp -av /backups/. "${archive_dir}/"
                  find /archive -mindepth 1 -maxdepth 1 -type d | sort | head -n -14 | xargs -r rm -rf --
              volumeMounts:
                - name: source-backups
                  mountPath: /backups
                  readOnly: true
                - name: archive-target
                  mountPath: /archive
          volumes:
            - name: source-backups
              persistentVolumeClaim:
                claimName: tavi-backups
            - name: archive-target
              persistentVolumeClaim:
                claimName: tavi-backup-archive
